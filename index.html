<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 영어 단어장</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sky:#3B9EE8;--sky-soft:#EAF4FD;--sky-mid:#A8D4F5;
  --green:#4BAE8A;--green-soft:#E6F7F1;--green-mid:#A8DFD0;
  --amber:#F5A623;--amber-soft:#FEF5E7;
  --red:#E85C5C;--red-soft:#FDEAEA;
  --purple:#8B70D8;--purple-soft:#F0ECFB;
  --orange:#F07830;--orange-soft:#FEF0E8;
  --pink:#E05FA0;--pink-soft:#FDF0F7;
  --bg:#F7F9FC;--surface:#FFFFFF;--border:#E4ECF5;
  --text:#1A2638;--text-muted:#7A8FA8;--text-light:#C0CBDA;
  --radius:16px;--radius-sm:10px;
  --shadow:0 4px 24px rgba(59,158,232,0.08);--shadow-md:0 8px 32px rgba(59,158,232,0.13);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:linear-gradient(135deg,#3B9EE8 0%,#6BC5F8 100%);padding:24px 20px 52px;text-align:center;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.1)}
.header::after{content:'';position:absolute;bottom:-60px;left:-30px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,0.07)}
.header-title{font-family:'Nunito',sans-serif;font-size:26px;font-weight:800;color:white;letter-spacing:-0.5px}
.header-sub{font-size:13px;color:rgba(255,255,255,0.8);margin-top:4px}
.stats-row{display:flex;gap:8px;padding:0 16px;margin-top:-28px;margin-bottom:18px;position:relative;z-index:10}
.stat-card{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:12px 6px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}
.stat-num{font-family:'Nunito',sans-serif;font-size:20px;font-weight:800}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:2px}
.stat-card.s1 .stat-num{color:var(--sky)}.stat-card.s2 .stat-num{color:var(--text-muted)}.stat-card.s3 .stat-num{color:var(--green)}.stat-card.s4 .stat-num{color:var(--amber)}
.tab-bar{display:flex;background:var(--surface);border-radius:var(--radius);margin:0 16px 18px;padding:4px;box-shadow:var(--shadow);border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px 4px;border:none;border-radius:12px;background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .icon{font-size:16px}
.tab-btn.active{background:var(--sky);color:white;box-shadow:0 4px 12px rgba(59,158,232,0.3)}
.section{display:none;padding:0 16px 100px}.section.active{display:block}
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted)}
.search-input{width:100%;padding:10px 12px 10px 38px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Noto Sans KR',sans-serif;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:var(--sky)}
.filter-row{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 11px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:11px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.filter-btn.active{background:var(--sky);border-color:var(--sky);color:white}
.tip-box{background:var(--sky-soft);border:1px solid var(--sky-mid);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:12px;color:#2672B0;line-height:1.7}
.word-list{display:flex;flex-direction:column;gap:8px}
.word-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:all 0.18s;animation:fadeIn 0.2s ease}
.word-item:hover{border-color:var(--green-mid);box-shadow:var(--shadow)}
.word-main{display:flex;align-items:center;gap:9px;padding:12px 12px;cursor:pointer}
.memorize-hint{font-size:11px;color:var(--green);opacity:0;transition:opacity 0.2s;font-weight:600;white-space:nowrap}
.word-main:hover .memorize-hint{opacity:1}
.word-item.memorized .word-main{background:var(--green-soft)}
.word-item.memorized .word-en{color:var(--green)}
.word-item.memorized .memorize-hint{color:var(--text-muted)}
.mnemonic-panel{background:var(--pink-soft);border-top:1px solid #F0B0D0;padding:10px 14px;display:none}
.mnemonic-panel.open{display:block}
.mnemonic-sound{font-size:13px;color:var(--pink);font-weight:700;margin-bottom:4px}
.mnemonic-story{font-size:13px;color:var(--text);line-height:1.7}
.mnemonic-story b{color:var(--pink)}
.mnemonic-toggle{background:var(--pink-soft);border:none;border-top:1px solid #F0C0D8;width:100%;padding:7px;font-size:12px;color:var(--pink);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;transition:background 0.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.mnemonic-toggle:hover{background:#FADCEE}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
.sliding-out{animation:slideOut 0.25s ease forwards}
.level-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.lvl-mid1{background:#E8F4FD;color:#2E86C1}.lvl-mid2{background:#E8F8F5;color:#1E8449}.lvl-mid3{background:#FEF9E7;color:#B7770D}
.lvl-hi1{background:#FEF5E7;color:#CA6F1E}.lvl-hi2{background:#FDEDEC;color:#C0392B}.lvl-hi3{background:#F5EEF8;color:#7D3C98}
.lvl-custom{background:#F4F4F4;color:#777}
.word-en{font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text);min-width:80px;flex-shrink:0}
.word-ko{font-size:12px;color:var(--text-muted);flex:1;line-height:1.4}
.sr-info{font-size:11px;color:var(--text-light);white-space:nowrap;flex-shrink:0}
.sr-info.due-now{color:var(--red);font-weight:700}
.speak-btn{background:var(--sky-soft);border:none;border-radius:7px;padding:5px 8px;color:var(--sky);font-size:13px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.speak-btn:hover{background:var(--sky);color:white}
.del-btn{background:none;border:none;color:var(--text-light);font-size:16px;cursor:pointer;padding:2px 3px;line-height:1;transition:color 0.15s;flex-shrink:0}
.del-btn:hover{color:var(--red)}
.section-label{font-size:12px;font-weight:700;color:var(--text-muted);padding:14px 2px 8px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.empty{text-align:center;padding:28px 20px;color:var(--text-muted);font-size:13px}
.empty .big{font-size:34px;margin-bottom:8px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;color:var(--text);margin-bottom:13px;display:flex;align-items:center;gap:7px}
.input-row{display:flex;gap:7px;margin-bottom:8px}
.text-input{flex:1;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'Noto Sans KR',sans-serif;font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.2s}
.text-input:focus{border-color:var(--sky);background:white}
.btn-add{padding:10px 16px;background:var(--sky);color:white;border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap}
.add-msg{font-size:12px;min-height:18px;margin-top:3px;padding-left:3px}
.level-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.level-tab{padding:5px 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface);font-size:11px;color:var(--text-muted);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif}
.level-tab.active{border-color:var(--sky);color:var(--sky);background:var(--sky-soft)}
.default-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;max-height:300px;overflow-y:auto}
.default-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;display:flex;align-items:center;justify-content:space-between;gap:4px}
.default-en{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700}
.default-ko{font-size:11px;color:var(--text-muted)}
.add-small{background:var(--sky-soft);border:none;border-radius:6px;padding:3px 8px;color:var(--sky);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;font-family:'Nunito',sans-serif;flex-shrink:0}
.add-small:hover:not(:disabled){background:var(--sky);color:white}
.add-small.added{background:var(--green-soft);color:var(--green);cursor:default}
.quiz-mode-row{display:flex;gap:7px;margin-bottom:12px}
.mode-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all 0.18s;font-weight:500}
.mode-btn.active{background:var(--purple-soft);border-color:var(--purple);color:var(--purple);font-weight:700}
.sr-panel{background:var(--orange-soft);border:1px solid #FBBF8A;border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sr-title{font-size:13px;font-weight:700;color:var(--orange)}.sr-desc{font-size:11px;color:var(--text-muted);margin-top:1px}
.sr-count{font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;color:var(--orange);margin-left:auto}
.score-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.score-text{font-size:12px;color:var(--text-muted)}.score-num{font-family:'Nunito',sans-serif;font-weight:800;color:var(--sky);font-size:15px}
.progress-track{height:6px;background:var(--border);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--green));border-radius:3px;transition:width 0.4s ease}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px 18px;text-align:center;margin-bottom:12px;box-shadow:var(--shadow-md)}
.quiz-hint{font-size:12px;color:var(--text-muted);margin-bottom:7px}
.quiz-meta{margin-bottom:9px}
.quiz-level{display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px}
.sr-tag{display:inline-block;margin-left:6px;font-size:11px;padding:2px 8px;border-radius:8px;background:var(--red-soft);color:var(--red);font-weight:700}
.quiz-word{font-family:'Nunito',sans-serif;font-size:30px;font-weight:800;color:var(--text);letter-spacing:-1px;margin-bottom:10px;word-break:break-word}
.quiz-speak{background:var(--sky-soft);border:none;border-radius:18px;padding:6px 14px;color:var(--sky);font-size:12px;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;font-weight:500}
.quiz-speak:hover{background:var(--sky);color:white}
.mnemonic-hint-box{background:var(--pink-soft);border:1px solid #F0B0D0;border-radius:var(--radius-sm);padding:10px 14px;margin:10px 0;text-align:left;display:none}
.mnemonic-hint-box.show{display:block}
.mh-label{font-size:11px;font-weight:700;color:var(--pink);margin-bottom:4px}
.mh-sound{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.mh-story{font-size:12px;color:var(--text-muted);line-height:1.6}
.mh-story b{color:var(--pink)}
.hint-toggle-btn{background:none;border:1px solid #F0B0D0;border-radius:20px;padding:5px 14px;color:var(--pink);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;margin:6px auto;display:block;transition:all 0.15s}
.hint-toggle-btn:hover{background:var(--pink-soft)}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.opt-btn{padding:13px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.18s;line-height:1.4}
.opt-btn:hover:not(:disabled){border-color:var(--sky);background:var(--sky-soft);color:var(--sky);transform:translateY(-2px)}
.opt-btn.correct{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.opt-btn.wrong{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.opt-btn:disabled{cursor:default;transform:none!important}
.result-msg{text-align:center;padding:10px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;margin-bottom:7px;display:none;animation:fadeIn 0.2s}
.result-msg.correct{background:var(--green-soft);color:var(--green)}
.result-msg.wrong{background:var(--red-soft);color:var(--red)}
.post-mnemonic{background:var(--pink-soft);border:1px solid #F0B0D0;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:10px;display:none;text-align:left}
.post-mnemonic.show{display:block;animation:fadeIn 0.3s}
.pm-title{font-size:12px;font-weight:700;color:var(--pink);margin-bottom:4px}
.pm-sound{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.pm-story{font-size:12px;color:var(--text-muted);line-height:1.6}
.pm-story b{color:var(--pink)}
.sr-feedback{text-align:center;font-size:12px;margin-bottom:10px;display:none}
.btn-next{width:100%;padding:13px;background:linear-gradient(135deg,var(--sky),#6BC5F8);color:white;border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:none;transition:all 0.18s}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(59,158,232,0.35)}
.quiz-empty{text-align:center;padding:32px 20px;color:var(--text-muted);font-size:13px;line-height:1.8}
.quiz-empty .big{font-size:36px;margin-bottom:10px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">📚 내 영어 단어장</div>
  <div class="header-sub">중1~고3 · 240개 전체 연상 암기법 + 간격 반복</div>
</div>
<div class="stats-row">
  <div class="stat-card s1"><div class="stat-num" id="s-total">0</div><div class="stat-label">전체 단어</div></div>
  <div class="stat-card s2"><div class="stat-num" id="s-learning">0</div><div class="stat-label">학습 중</div></div>
  <div class="stat-card s3"><div class="stat-num" id="s-memorized">0</div><div class="stat-label">✅ 외운 단어</div></div>
  <div class="stat-card s4"><div class="stat-num" id="s-streak">0</div><div class="stat-label">🔥 연속일</div></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('list')"><span class="icon">📖</span>단어장</button>
  <button class="tab-btn" onclick="switchTab('memorized')"><span class="icon">✅</span>외운 단어</button>
  <button class="tab-btn" onclick="switchTab('add')"><span class="icon">➕</span>추가</button>
  <button class="tab-btn" onclick="switchTab('quiz')"><span class="icon">🎯</span>퀴즈</button>
</div>

<div id="tab-list" class="section active">
  <div class="tip-box">💡 단어를 <b>클릭</b>하면 외운 단어로 이동해요.<br>🧠 <b style="color:var(--pink)">분홍 힌트 버튼</b>으로 연상 이미지 암기법을 확인하세요!</div>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="단어 검색..." oninput="renderList()"></div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" onclick="setFilter('mid1',this)">중1</button>
    <button class="filter-btn" onclick="setFilter('mid2',this)">중2</button>
    <button class="filter-btn" onclick="setFilter('mid3',this)">중3</button>
    <button class="filter-btn" onclick="setFilter('hi1',this)">고1</button>
    <button class="filter-btn" onclick="setFilter('hi2',this)">고2</button>
    <button class="filter-btn" onclick="setFilter('hi3',this)">고3</button>
  </div>
  <div class="word-list" id="wordList"></div>
</div>

<div id="tab-memorized" class="section">
  <div class="tip-box" style="background:var(--green-soft);border-color:var(--green-mid);color:#2E7D5E">💡 단어를 <b>클릭</b>하면 다시 학습 중으로 돌아가요. 퀴즈는 이 목록에서 출제돼요!</div>
  <div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchMemorized" placeholder="외운 단어 검색..." oninput="renderMemorized()"></div>
  <div class="word-list" id="memorizedList"></div>
</div>

<div id="tab-add" class="section">
  <div class="card">
    <div class="card-title">✏️ 직접 추가하기</div>
    <div class="input-row">
      <input class="text-input" id="inEn" placeholder="영어" onkeydown="if(event.key==='Enter')document.getElementById('inKo').focus()">
      <input class="text-input" id="inKo" placeholder="한국어 뜻" onkeydown="if(event.key==='Enter')addWord()">
      <button class="btn-add" onclick="addWord()">추가</button>
    </div>
    <div class="add-msg" id="addMsg"></div>
  </div>
  <div class="card">
    <div class="card-title">📋 수준별 단어 모음</div>
    <div class="level-tabs" id="levelTabs"></div>
    <div class="default-grid" id="defaultGrid"></div>
  </div>
</div>

<div id="tab-quiz" class="section">
  <div id="quizArea"></div>
</div>

<script>
/* ══════════════════════════════════════════
   연상 이미지 암기법 — 240개 전체
   제임스 한 방식: 발음 연상 + 이미지 스토리
══════════════════════════════════════════ */
var MN = {
  /* ── 중1 (39개) ── */
  'absent':    {s:'압생트',    t:'**압생트** 술을 마셔서 학교에 **결석**했다'},
  'arrive':    {s:'아 라이브', t:'아, **라이브** 공연장에 드디어 **도착**했다!'},
  'borrow':    {s:'바로',      t:'**바로** 지금 돈을 **빌렸다**'},
  'careful':   {s:'케어풀',    t:'케어(care=돌봄)가 풀(full)하면 **조심스럽다**'},
  'certainly': {s:'써튼리',    t:'써튼(certain=확실)하게 리(ly) — **확실히** 맞아!'},
  'change':    {s:'체인지',    t:'체인(chain=쇠사슬)이 지(지는) — 쇠사슬이 **바뀌다**'},
  'choose':    {s:'추-즈',     t:'치즈 중에서 하나를 **선택**해야 해 — 추~즈'},
  'collect':   {s:'컬렉트',    t:'**컬렉션**을 만들려면 **모아야** 해'},
  'contact':   {s:'콘택트',    t:'**콘택트** 렌즈 받으려고 **연락**했다'},
  'correct':   {s:'커렉트',    t:'크게 레고를 **수정**해서 **올바르게** 만들다'},

function calcSR(c,ok){var i=c.interval||0,e=c.easiness||2.5,r=c.reps||0;if(ok){r++;i=r===1?1:r===2?3:Math.round(i*e);e=Math.max(1.3,e+0.05);}else{r=0;i=1;e=Math.max(1.3,e-0.2);}return{interval:i,easiness:e,reps:r};}
function isDue(c){return !c.nextReview||Date.now()>=c.nextReview;}
function daysUntil(c){if(!c.nextReview)return 0;var d=c.nextReview-Date.now();return d<=0?0:Math.ceil(d/86400000);}
function getMN(en){return MN[en.toLowerCase()]||null;}

function load(){
  try{

    var w=localStorage.getItem('ev6_words');

    if(!w) w=localStorage.getItem('ev5_words');
    if(!w) w=localStorage.getItem('ev4_words');
    if(!w) w=localStorage.getItem('ev3_words');
    if(!w) w=localStorage.getItem('ev2_words');
    if(!w) w=localStorage.getItem('ev_words');
    if(w) words=JSON.parse(w);
    // 이전 버전 단어에 memorized 필드 없으면 추가
    words.forEach(function(wd){if(typeof wd.memorized==='undefined')wd.memorized=false;});
    var s=localStorage.getItem('ev6_s')||localStorage.getItem('ev5_s')||localStorage.getItem('ev4_s')||localStorage.getItem('ev3_s');
    if(s){var d=JSON.parse(s);streak=d.streak||0;lastStreakDate=d.lastStreakDate||null;}
  }catch(e){}
  if(!words.length){Object.keys(DEFAULTS).forEach(function(lvl){DEFAULTS[lvl].forEach(function(d){words.push({en:d.en,ko:d.ko,level:lvl,added:Date.now(),memorized:false});});});save();}
  var today=new Date().toDateString();
  if(lastStreakDate&&lastStreakDate!==today){var yest=new Date(Date.now()-86400000).toDateString();if(lastStreakDate!==yest)streak=0;}
}

  document.getElementById('s-streak').textContent=streak;

}

function toggleMemorized(en){
  var idx=words.findIndex(function(w){return w.en===en;});if(idx<0)return;

  if(item){item.classList.add('sliding-out');setTimeout(function(){words[idx].memorized=!words[idx].memorized;if(words[idx].memorized){words[idx].reps=0;words[idx].interval=0;words[idx].nextReview=null;}save();updateStats();renderList();renderMemorized();},250);}
  else{words[idx].memorized=!words[idx].memorized;if(words[idx].memorized){words[idx].reps=0;words[idx].interval=0;words[idx].nextReview=null;}save();updateStats();renderList();renderMemorized();}

function buildWordItem(w,isMemorized){
  var lvl=w.level||'mid1',enSafe=w.en.replace(/'/g,"\\'"),mn=getMN(w.en);
  var srText=isMemorized?(isDue(w)?'<span class="sr-info due-now">🔴 복습</span>':'<span class="sr-info">'+daysUntil(w)+'일 후</span>'):'';
  var hint=isMemorized?'↩ 되돌리기':'✓ 외웠어요';
  var mnBtn=mn?'<button class="mnemonic-toggle" onclick="event.stopPropagation();toggleMnemonicPanel(\''+enSafe+'\')">🧠 연상 힌트 보기</button>':'';
  var mnPanel=mn?'<div class="mnemonic-panel" id="mp-'+w.en+'"><div class="mnemonic-sound">🔊 발음 연상: "'+mn.s+'"</div><div class="mnemonic-story">'+renderStory(mn.t)+'</div></div>':'';
  return '<div class="word-item'+(isMemorized?' memorized':'')+'" data-en="'+w.en+'">'
    +'<div class="word-main" onclick="toggleMemorized(\''+enSafe+'\')">'
      +'<span class="level-badge '+(LEVEL_CLS[lvl]||'lvl-custom')+'">'+(LEVEL_NAMES[lvl]||'직접')+'</span>'
      +'<div class="word-en">'+w.en+'</div><div class="word-ko">'+w.ko+'</div>'
      +srText+'<span class="memorize-hint">'+hint+'</span>'
      +'<button class="speak-btn" onclick="event.stopPropagation();speak(\''+enSafe+'\')">🔊</button>'
      +'<button class="del-btn" onclick="event.stopPropagation();deleteWord(\''+enSafe+'\')">×</button>'
    +'</div>'+mnBtn+mnPanel+'</div>';
}

function renderMemorized(){
  var q=(document.getElementById('searchMemorized').value||'').toLowerCase();

function addWord(){

  if(words.find(function(w){return w.en===en;})){showMsg('"'+en+'" 은 이미 있어요!','amber');return;}
  words.push({en:en,ko:ko,level:'custom',added:Date.now(),memorized:false});

function pickQuizWord(pool){
  if(!pool.length)return null;
  var weights=pool.map(function(w){return isDue(w)?4:1;}),total=weights.reduce(function(a,b){return a+b;},0),r=Math.random()*total;
  for(var i=0;i<pool.length;i++){r-=weights[i];if(r<=0)return pool[i];}
  return pool[pool.length-1];
}

    +'<div class="mh-sound">발음 연상: "'+mn.s+'"</div><div class="mh-story">'+renderStory(mn.t)+'</div></div>':'';
  document.getElementById('quizArea').innerHTML=hdr
    +'<div class="score-bar"><span class="score-text">오늘 점수</span><span class="score-num" id="scoreNum">'+qScore+'점 / '+qTotal+'문제</span></div>'
    +'<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:'+pct+'%"></div></div>'
    +'<div class="quiz-card">'
      +'<div class="quiz-hint">'+(quizMode==='en-ko'?'이 영어 단어의 뜻은?':'이 뜻의 영어 단어는?')+'</div>'
      +'<div class="quiz-meta"><span class="quiz-level '+(LEVEL_CLS[lvl]||'lvl-custom')+'">'+(LEVEL_NAMES[lvl]||'직접')+'</span>'+(isDue(q)?'<span class="sr-tag">🔁 복습</span>':'')+'</div>'
      +'<div class="quiz-word">'+question+'</div>'
      +(quizMode==='en-ko'?'<button class="quiz-speak" onclick="speak(\''+enSafe+'\')">🔊 발음 듣기</button>':'')
      +mnHintHtml
    +'</div>'
    +'<div class="options-grid">'+opts.map(function(o){var oS=o.replace(/'/g,"\\'").replace(/"/g,'&quot;');return '<button class="opt-btn" onclick="checkAns(this,\''+oS+'\',\''+ansSafe+'\',\''+enSafe+'\')">'+o+'</button>';}).join('')+'</div>'
    +'<div class="result-msg" id="resultMsg"></div>'
    +'<div class="post-mnemonic" id="postMnemonic"></div>'
    +'<div class="sr-feedback" id="srFeedback"></div>'
    +'<button class="btn-next" id="nextBtn" onclick="startQuiz()">다음 단어 →</button>';
}
function toggleQuizHint(){
  var box=document.getElementById('quizHintBox'),btn=document.getElementById('hintToggleBtn');
  if(!box)return;box.classList.toggle('show');btn.textContent=box.classList.contains('show')?'🧠 힌트 닫기':'🧠 연상 힌트 보기';
}
function checkAns(btn,chosen,answer,wordEn){
  if(answered)return;answered=true;qTotal++;
  var correct=chosen===answer;if(correct)qScore++;
  var widx=words.findIndex(function(w){return w.en===wordEn;});
  if(widx>=0){var card=words[widx],sr=calcSR(card,correct);words[widx]=Object.assign({},card,sr,{nextReview:Date.now()+sr.interval*86400000,lastAnswered:Date.now()});}
  var today=new Date().toDateString();if(lastStreakDate!==today){streak++;lastStreakDate=today;}
  save();updateStats();
  document.querySelectorAll('.opt-btn').forEach(function(b){b.disabled=true;if(b.textContent.trim()===answer)b.classList.add('correct');else if(b===btn&&!correct)b.classList.add('wrong');});
  var rm=document.getElementById('resultMsg');rm.style.display='block';rm.className='result-msg '+(correct?'correct':'wrong');
  rm.textContent=correct?'🎉 정답! 잘했어요!':'😅 틀렸어요. 정답은 "'+answer+'" 예요.';
  var mn=getMN(wordEn),pm=document.getElementById('postMnemonic');
  if(mn&&pm){pm.className='post-mnemonic show';pm.innerHTML='<div class="pm-title">🧠 연상으로 기억해요!</div><div class="pm-sound">발음 연상: "'+mn.s+'"</div><div class="pm-story">'+renderStory(mn.t)+'</div>';}
  var fb=document.getElementById('srFeedback');
  if(fb){fb.style.display='block';var uc=words[widx];if(correct){var days=daysUntil(uc);fb.style.color='var(--green)';fb.textContent=days<=1?'내일 다시 복습할게요! 📅':days+'일 후에 다시 복습합니다 📅';}else{fb.style.color='var(--red)';fb.textContent='틀렸으니 내일 꼭 다시 복습해요! 🔁';}}
  document.getElementById('progressFill').style.width=Math.round((qScore/qTotal)*100)+'%';
  document.getElementById('scoreNum').textContent=qScore+'점 / '+qTotal+'문제';
  document.getElementById('nextBtn').style.display='block';
  if(correct&&quizMode==='en-ko')speak(wordEn);
}
load();updateStats();renderList();
</script>
</body>
</html>
